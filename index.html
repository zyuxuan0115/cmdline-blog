<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Document Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="desktop">
    <canvas id="space-bg"></canvas>
    <div id="main-area">
      <div id="windows-container"></div>
      <div id="help-sidebar">
        <div id="help-sidebar-header">
          <span>Commands</span>
          <button id="help-sidebar-close" title="Close (help close)">✕</button>
        </div>
        <div id="help-sidebar-content"></div>
      </div>
    </div>
    <div id="terminal-panel">
      <div id="terminal-resize-handle"></div>
      <div id="terminal-output"></div>
      <div id="terminal-input-row">
        <span id="terminal-prompt">$ </span>
        <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
