<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Document Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="desktop">
    <canvas id="space-bg"></canvas>
    <div id="main-area">
      <div id="windows-container"></div>
    </div>
    <div id="terminal-panel">
      <div id="terminal-resize-handle"></div>
      <img id="terminal-girl" src="pic/girl.png" alt="">

      <div id="terminal-output"></div>
      <div id="terminal-input-row">
        <span id="terminal-prompt">$ </span>
        <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
    <div id="help-sidebar">
      <div id="help-sidebar-header">
        <span id="help-sidebar-title">Commands</span>
        <button id="help-sidebar-close" title="Close (help close)">✕</button>
      </div>
      <div id="help-sidebar-content"></div>
    </div>
  </div>
  <script src="js/state.js"></script>
  <script src="js/db.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/help.js"></script>
  <script src="js/documents.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/resize.js"></script>
  <script src="js/background.js"></script>
  <script src="js/init.js"></script>
</body>
</html>
